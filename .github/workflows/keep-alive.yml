name: Supabase Keep Alive

on:
  schedule:
    # Berjalan pada pukul 12:00 tengah malam setiap 3 hari
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Membolehkan trigger manual dari tab Actions di GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/school_settings?select=id" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
